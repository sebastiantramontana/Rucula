name: Android
on:
  workflow_run:
    workflows: ["Main"]
    types:
    - completed

jobs:
  build-android:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download website artifact
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: main.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: final-website-dist
          path: ./dist

      - name: Remove compressed WASM artifacts
        run: |
          find ./dist/_framework/ -name "*.gz" -delete
          find ./dist/_framework/ -name "*.br" -delete

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Restore keystore
        working-directory: android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/rucula-release.jks

      - name: Verify keystore
        working-directory: android
        run: ls -la app

      - name: Verify keystore content
        working-directory: android
        run: |
          keytool -list -keystore app/rucula-release.jks \
          -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"

      - name: Show signing environment
        working-directory: android
        run: |
          echo "KEYSTORE=$ANDROID_KEYSTORE_FILE"
          echo "ALIAS=$ANDROID_KEY_ALIAS"
        env:
          ANDROID_KEYSTORE_FILE: app/rucula-release.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: rucula-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Show APKs
        working-directory: android
        run: find app/build/outputs/apk -name "*.apk"

      - name: Create APK directory
        run: mkdir -p ./dist/mobile/android

      - name: Copy APK
        run: |
          cp android/app/build/outputs/apk/release/*.apk \
            ./dist/mobile/android/rucula.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apk
          path: ./dist/mobile/android/rucula.apk
          retention-days: 1

